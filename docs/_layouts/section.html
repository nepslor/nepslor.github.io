---
layout: default
---

<div class="layout-with-sidebar">
  <article class="layout-main">
    {% if page.title %}
      <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
      </header>
    {% endif %}
    <div class="section-body">
      {{ content }}
    </div>
  </article>
  <aside class="cv-sidebar" aria-label="Section navigation">
    {% include cv-nav.html %}
  </aside>
</div>
